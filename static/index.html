<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МИС Система | Управление задачами</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="flex flex-col h-screen">
    <!-- Navbar mock -->
    <header class="bg-gray-800 text-white flex items-center p-3">
        <div class="flex items-center space-x-2">
            <div class="w-3 h-3 rounded-full bg-red-500"></div>
            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
            <div class="w-3 h-3 rounded-full bg-green-500"></div>
        </div>
        <div class="ml-4 text-sm font-medium">МИС Система | Управление задачами</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar mock -->
        <aside class="w-64 bg-gray-100 border-r border-gray-200 p-4">
            <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-4">МИС</div>
            <nav class="space-y-1">
                <a href="#" class="flex items-center px-3 py-2 text-gray-700 rounded-md hover:bg-gray-200">
                    <svg class="mr-3 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Пациенты
                </a>
                <a href="#" class="flex items-center px-3 py-2 text-gray-700 rounded-md hover:bg-gray-200">
                    <svg class="mr-3 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Расписание
                </a>
                <a href="#" class="flex items-center px-3 py-2 bg-blue-100 text-blue-700 rounded-md font-medium">
                    <svg class="mr-3 h-5 w-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                    ЗАДАЧИ
                </a>
                <a href="#" class="flex items-center px-3 py-2 text-gray-700 rounded-md hover:bg-gray-200">
                    <svg class="mr-3 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Отчеты
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="flex-1 overflow-y-auto p-8">
            <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-sm border border-gray-200">
                <div class="border-b border-gray-200 px-6 py-4">
                    <h2 class="text-xl font-semibold text-gray-800">Параметры задачи</h2>
                </div>
                
                <form id="taskForm" class="p-6 space-y-6">
                    <div id="alertBox" class="hidden rounded-md p-4 mb-4 text-sm"></div>

                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Название</label>
                        <input type="text" id="title" name="title" required placeholder="Введите краткое название задачи..." class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                        <textarea id="description" name="description" rows="3" placeholder="Подробно опишите задачу, пациента (ФИО, г/р), действия..." class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Статус</label>
                            <select id="status" name="status" class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                <option value="new">Новая</option>
                                <option value="in_progress">В процессе</option>
                                <option value="done">Завершена</option>
                            </select>
                        </div>
                        <div>
                            <label for="scheduled_at" class="block text-sm font-medium text-gray-700 mb-1">Срок выполнения (ScheduledAt)</label>
                            <input type="datetime-local" id="scheduled_at" name="scheduled_at" required class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>
                    </div>

                    <div class="border rounded-md overflow-hidden">
                        <div class="bg-slate-800 text-white px-4 py-2 text-sm font-medium">
                            Настройки повторяемости
                        </div>
                        <div class="p-4 bg-gray-50 space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label for="recurrence_type" class="block text-sm font-medium text-gray-700 mb-1">Тип повторения:</label>
                                    <select id="recurrence_type" name="recurrence_type" class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                        <option value="">Без повторения</option>
                                        <option value="daily">Ежедневно (каждый n-й день)</option>
                                        <option value="monthly">Ежемесячно (конкретные числа)</option>
                                        <option value="specific_dates">На конкретные даты</option>
                                        <option value="even_days">По четным дням</option>
                                        <option value="odd_days">По нечетным дням</option>
                                    </select>
                                </div>
                                
                                <!-- Dynamic fields container -->
                                <div id="dynamicRecurrenceFields">
                                    <!-- Daily -->
                                    <div id="field-daily" class="hidden">
                                        <label for="recurrence_interval" class="block text-sm font-medium text-gray-700 mb-1">Периодичность (в днях):</label>
                                        <input type="number" id="recurrence_interval" name="recurrence_interval" min="1" value="1" class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                    </div>
                                    <!-- Monthly -->
                                    <div id="field-monthly" class="hidden">
                                        <label for="recurrence_month_days" class="block text-sm font-medium text-gray-700 mb-1">Числа месяца (через запятую):</label>
                                        <input type="text" id="recurrence_month_days" name="recurrence_month_days" placeholder="Например: 1, 15, 25" class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                        <p class="text-xs text-gray-500 mt-1">Укажите дни месяца (от 1 до 31)</p>
                                    </div>
                                    <!-- Specific dates -->
                                    <div id="field-specific" class="hidden">
                                        <label for="recurrence_specific_dates" class="block text-sm font-medium text-gray-700 mb-1">Конкретные даты (через запятую):</label>
                                        <input type="text" id="recurrence_specific_dates" name="recurrence_specific_dates" placeholder="YYYY-MM-DD, YYYY-MM-DD" class="w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center space-x-3 pt-4">
                        <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-slate-800 hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500">
                            Создать задачу
                        </button>
                        <button type="button" onclick="document.getElementById('taskForm').reset();" class="inline-flex justify-center py-2 px-4 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Отмена
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- List of tasks mock -->
            <div class="max-w-3xl mx-auto mt-8">
                <h3 class="text-lg font-medium text-gray-900 mb-4">Недавние задачи</h3>
                <div id="tasksList" class="bg-white shadow overflow-hidden sm:rounded-md">
                    <ul class="divide-y divide-gray-200" id="tasksContainer">
                        <!-- Tasks will be loaded here -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Handle dynamic fields based on recurrence type
        const typeSelect = document.getElementById('recurrence_type');
        const fields = {
            'daily': document.getElementById('field-daily'),
            'monthly': document.getElementById('field-monthly'),
            'specific_dates': document.getElementById('field-specific')
        };

        typeSelect.addEventListener('change', (e) => {
            // Hide all first
            Object.values(fields).forEach(f => {
                if (f) f.classList.add('hidden');
            });
            // Show selected if exists
            const selected = e.target.value;
            if (fields[selected]) {
                fields[selected].classList.remove('hidden');
            }
        });

        // Set default date to now
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('scheduled_at').value = now.toISOString().slice(0,16);

        // Fetch and render tasks
        async function fetchTasks() {
            try {
                const res = await fetch('/api/v1/tasks');
                const tasks = await res.json();
                const container = document.getElementById('tasksContainer');
                
                if (!tasks || tasks.length === 0) {
                    container.innerHTML = '<li class="px-6 py-4 text-center text-gray-500">Нет задач</li>';
                    return;
                }

                container.innerHTML = tasks.map(task => {
                    const statusColors = {
                        'new': 'bg-blue-100 text-blue-800',
                        'in_progress': 'bg-yellow-100 text-yellow-800',
                        'done': 'bg-green-100 text-green-800'
                    };
                    const color = statusColors[task.status] || 'bg-gray-100 text-gray-800';
                    
                    let recText = 'Без повторения';
                    if (task.recurrence_type) {
                        recText = `Повторение: ${task.recurrence_type}`;
                    }

                    return `
                    <li>
                        <div class="px-4 py-4 sm:px-6 hover:bg-gray-50">
                            <div class="flex items-center justify-between">
                                <p class="text-sm font-medium text-slate-800 truncate">${task.title}</p>
                                <div class="ml-2 flex-shrink-0 flex">
                                    <p class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${color}">
                                        ${task.status}
                                    </p>
                                </div>
                            </div>
                            <div class="mt-2 sm:flex sm:justify-between">
                                <div class="sm:flex text-sm text-gray-500">
                                    <p>${task.description || 'Нет описания'}</p>
                                </div>
                                <div class="mt-2 flex items-center text-sm text-gray-500 sm:mt-0">
                                    <p>${recText} | Выполнить: ${new Date(task.scheduled_at).toLocaleString()}</p>
                                </div>
                            </div>
                        </div>
                    </li>`;
                }).join('');
            } catch (err) {
                console.error('Failed to fetch tasks', err);
            }
        }

        // Form submission
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.add('hidden');
            
            const formData = new FormData(e.target);
            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                status: formData.get('status'),
            };

            // Format scheduled_at to RFC3339
            const schDate = new Date(formData.get('scheduled_at'));
            data.scheduled_at = schDate.toISOString();

            const recType = formData.get('recurrence_type');
            if (recType) {
                data.recurrence_type = recType;
                
                if (recType === 'daily') {
                    data.recurrence_interval = parseInt(formData.get('recurrence_interval')) || 1;
                } else if (recType === 'monthly') {
                    const daysStr = formData.get('recurrence_month_days');
                    if (daysStr) {
                        data.recurrence_month_days = daysStr.split(',').map(d => parseInt(d.trim())).filter(d => !isNaN(d));
                    }
                } else if (recType === 'specific_dates') {
                    const datesStr = formData.get('recurrence_specific_dates');
                    if (datesStr) {
                        data.recurrence_specific_dates = datesStr.split(',').map(d => {
                            const date = new Date(d.trim());
                            return date.toISOString();
                        });
                    }
                }
            }

            try {
                const res = await fetch('/api/v1/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    alertBox.className = 'rounded-md p-4 mb-4 text-sm bg-green-50 text-green-800';
                    alertBox.textContent = 'Задача успешно создана!';
                    alertBox.classList.remove('hidden');
                    e.target.reset();
                    // Reset default date
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                    document.getElementById('scheduled_at').value = now.toISOString().slice(0,16);
                    fetchTasks();
                } else {
                    const err = await res.json();
                    throw new Error(err.error || 'Произошла ошибка при создании');
                }
            } catch (err) {
                alertBox.className = 'rounded-md p-4 mb-4 text-sm bg-red-50 text-red-800';
                alertBox.textContent = err.message;
                alertBox.classList.remove('hidden');
            }
        });

        // Initial load
        fetchTasks();
    </script>
</body>
</html>
